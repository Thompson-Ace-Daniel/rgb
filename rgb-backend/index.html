<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <button id="player">Play</button>
  <script>
    const player = document.getElementById("player");
    async function playAudioFromBackend(textInput) {
      const response = await fetch('http://localhost:5000/api/generate-audio', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ text: textInput }),
      });

      if (!response.ok) {
        console.error("Failed to fetch audio");
        return;
      }

      const audioBlob = await response.blob();

      const audioUrl = URL.createObjectURL(audioBlob);

      const audio = new Audio(audioUrl);
      audio.play();
    }
    player.onclick = () => playAudioFromBackend("Tegwolo, professionally speaking, your head na true monument. E big well well, like say e fit carry the whole community problem for inside. Na correct jumbo!");
  </script>
</body>

</html>
